apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-security-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  security-overview.json: |
    {
      "title": "Sécurité — Vue d'ensemble (Trivy / Falco / Argo CD)",
      "uid": "security-overview",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "timezone": "browser",
      "time": { "from": "now-6h", "to": "now" },
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Applications Argo CD saines",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count(argocd_app_info{health_status=\"Healthy\"}) / count(argocd_app_info) * 100",
              "legendFormat": "% healthy",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "green", "value": 100 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "CVE Critical + High (actuel)",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(trivy_image_vulnerabilities{severity=~\"Critical|High\", namespace=~\"demo.*\"})",
              "legendFormat": "CVE Critical/High",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 10 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Violations config (actuel)",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(trivy_resource_configaudits{namespace=~\"demo.*\"} > 0)",
              "legendFormat": "Checks en échec",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Alertes Falco (fenêtre affichée)",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(increase(falcosecurity_falcosidekick_falco_events_total[$__range]))",
              "legendFormat": "Événements Falco",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "CVE par sévérité dans le temps (nginx vulnerable-web)",
          "description": "Doit chuter visiblement après le merge de la PR de remédiation.",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (severity) (trivy_image_vulnerabilities{namespace=~\"demo.*\"})",
              "legendFormat": "{{severity}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "drawStyle": "line", "fillOpacity": 10 } },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Violations de configuration par sévérité",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (severity) (trivy_resource_configaudits{namespace=~\"demo.*\"})",
              "legendFormat": "{{severity}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "drawStyle": "line", "fillOpacity": 10 } },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Alertes Falco par règle",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (rule) (rate(falcosecurity_falcosidekick_falco_events_total[5m]))",
              "legendFormat": "{{rule}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "drawStyle": "bars", "fillOpacity": 40 } },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "CPU des pods — namespace demo*",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=~\"demo.*\", container!=\"\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "drawStyle": "line", "fillOpacity": 10 } },
            "overrides": []
          }
        }
      ]
    }
